<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kl Animal Alert - Worker Screen</title>
    <style>
        /* ============ RESET & BASE ============ */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --green-bg: #0d1f0d;
            --green-glow: #00ff41;
            --yellow-bg: #2e1f00;
            --yellow-glow: #ffaa00;
            --red-bg: #1a0000;
            --red-glow: #ff2222;
            --text-light: #e0e0e0;
            --text-dim: #999999;
            --panel-bg: rgba(0, 0, 0, 0.6);
        }

        body {
            font-family: 'Arial', 'Helvetica', sans-serif;
            background: #000000;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            /* REMOVED cursor: none; so mouse is visible for demo */
        }

        /* ============ MAIN CONTAINER ============ */
        .screen-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: background-color 0.4s ease;
        }

        /* ============ CONTENT AREA ============ */
        .alert-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            z-index: 10;
            padding: 40px;
            max-width: 90%;
        }

        /* ============ ICONS ============ */
        .alert-icon {
            font-size: 120px;
            line-height: 1;
            margin-bottom: 20px;
            transition: all 0.3s ease;
            filter: drop-shadow(0 0 30px currentColor);
        }

        /* ============ MAIN STATUS TEXT ============ */
        .status-main {
            font-size: 64px;
            font-weight: 900;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 8px;
            line-height: 1.1;
        }

        /* ============ SUBTITLE ============ */
        .status-sub {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: 2px;
            margin-bottom: 6px;
            opacity: 0.9;
        }

        /* ============ INFO TEXT ============ */
        .status-info {
            font-size: 22px;
            font-weight: 400;
            letter-spacing: 1px;
            opacity: 0.8;
            margin-bottom: 4px;
        }

        .status-info-small {
            font-size: 16px;
            font-weight: 400;
            letter-spacing: 1px;
            opacity: 0.6;
            margin-top: 16px;
        }

        /* ============ BOTTOM INFO BAR ============ */
        .info-bar {
            position: absolute;
            bottom: 30px;
            left: 40px;
            right: 40px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            z-index: 10;
        }

        .info-bar-left {
            display: flex;
            flex-direction: column;
            gap: 6px;
            text-align: left;
        }

        .info-bar-right {
            text-align: right;
        }

        .info-label {
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.5;
        }

        .info-value {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 1px;
            opacity: 0.85;
        }

        /* ============ TOP BRANDING BAR ============ */
        .branding-bar {
            position: absolute;
            top: 30px;
            left: 40px;
            right: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            opacity: 0.4;
        }

        .branding-logo {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .branding-time {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 2px;
        }

        /* ============ GREEN STATE ============ */
        .state-green .screen-container {
            background: radial-gradient(ellipse at center, #0d2b0d 0%, #0a1a0a 40%, #050f05 100%);
            border: 3px solid #1a4a1a;
        }
        .state-green .alert-icon {
            color: #00ff41;
        }
        .state-green .status-main {
            color: #00ff41;
            text-shadow: 0 0 40px rgba(0, 255, 65, 0.4), 0 0 80px rgba(0, 255, 65, 0.2);
        }
        .state-green .status-sub,
        .state-green .status-info,
        .state-green .status-info-small {
            color: #ccffcc;
        }
        .state-green .info-label,
        .state-green .info-value,
        .state-green .branding-logo,
        .state-green .branding-time {
            color: #aaffaa;
        }
        .state-green .info-bar {
            border-top: 1px solid rgba(0, 255, 65, 0.15);
            padding-top: 18px;
        }

        /* ============ YELLOW STATE ============ */
        .state-yellow .screen-container {
            background: radial-gradient(ellipse at center, #2e2000 0%, #1f1500 40%, #0f0a00 100%);
            border: 3px solid #664400;
            animation: yellowPulse 1s ease-in-out infinite;
        }
        .state-yellow .alert-icon {
            color: #ffaa00;
            animation: iconPulse 1s ease-in-out infinite;
        }
        .state-yellow .status-main {
            color: #ffaa00;
            text-shadow: 0 0 40px rgba(255, 170, 0, 0.4), 0 0 80px rgba(255, 170, 0, 0.2);
        }
        .state-yellow .status-sub,
        .state-yellow .status-info,
        .state-yellow .status-info-small {
            color: #ffe0aa;
        }
        .state-yellow .info-label,
        .state-yellow .info-value,
        .state-yellow .branding-logo,
        .state-yellow .branding-time {
            color: #ffdd99;
        }
        .state-yellow .info-bar {
            border-top: 1px solid rgba(255, 170, 0, 0.2);
            padding-top: 18px;
        }

        /* ============ RED STATE ============ */
        .state-red .screen-container {
            background: radial-gradient(ellipse at center, #2a0000 0%, #1a0000 40%, #0a0000 100%);
            border: 3px solid #660000;
            animation: redFlash 0.5s ease-in-out infinite;
        }
        .state-red .alert-icon {
            color: #ff2222;
            animation: iconShake 0.3s ease-in-out infinite;
        }
        .state-red .status-main {
            color: #ff2222;
            text-shadow: 0 0 50px rgba(255, 34, 34, 0.6), 0 0 100px rgba(255, 34, 34, 0.3);
        }
        .state-red .status-sub,
        .state-red .status-info,
        .state-red .status-info-small {
            color: #ffaaaa;
        }
        .state-red .info-label,
        .state-red .info-value,
        .state-red .branding-logo,
        .state-red .branding-time {
            color: #ff9999;
        }
        .state-red .info-bar {
            border-top: 1px solid rgba(255, 34, 34, 0.3);
            padding-top: 18px;
        }

        /* ============ ANIMATIONS ============ */
        @keyframes yellowPulse {
            0%, 100% { box-shadow: inset 0 0 60px rgba(255, 170, 0, 0.1); }
            50% { box-shadow: inset 0 0 120px rgba(255, 170, 0, 0.25); }
        }

        @keyframes redFlash {
            0%, 100% { 
                box-shadow: inset 0 0 80px rgba(255, 0, 0, 0.2);
                border-color: #660000;
            }
            50% { 
                box-shadow: inset 0 0 160px rgba(255, 0, 0, 0.5);
                border-color: #ff0000;
            }
        }

        @keyframes iconPulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(255, 170, 0, 0.5)); }
            50% { transform: scale(1.08); filter: drop-shadow(0 0 40px rgba(255, 170, 0, 0.8)); }
        }

        @keyframes iconShake {
            0%, 100% { transform: translateX(0) scale(1); filter: drop-shadow(0 0 30px rgba(255, 0, 0, 0.6)); }
            25% { transform: translateX(-6px) scale(1.05); }
            50% { transform: translateX(6px) scale(1.05); }
            75% { transform: translateX(-4px) scale(1.02); filter: drop-shadow(0 0 50px rgba(255, 0, 0, 0.9)); }
        }

        /* ============ DEMO PANEL ============ */
        .demo-panel {
            position: absolute;
            bottom: 30px;
            right: 40px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
        }

        .demo-toggle {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: rgba(255, 255, 255, 0.4);
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .demo-toggle:hover {
            background: rgba(255, 255, 255, 0.12);
            color: rgba(255, 255, 255, 0.7);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .demo-buttons {
            display: none;
            flex-direction: column;
            gap: 4px;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            padding: 8px;
            backdrop-filter: blur(10px);
        }

        .demo-buttons.show {
            display: flex;
        }

        .demo-btn {
            background: transparent;
            border: 1px solid transparent;
            color: rgba(255, 255, 255, 0.6);
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.2s ease;
            font-family: inherit;
            text-align: left;
            white-space: nowrap;
        }

        .demo-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
            border-color: rgba(255, 255, 255, 0.3);
        }

        .demo-btn.btn-green { border-left: 3px solid #00ff41; }
        .demo-btn.btn-yellow { border-left: 3px solid #ffaa00; }
        .demo-btn.btn-red { border-left: 3px solid #ff2222; }

        /* ============ RESPONSIVE ============ */
        @media (max-width: 768px) {
            .alert-icon { font-size: 80px; }
            .status-main { font-size: 40px; letter-spacing: 2px; }
            .status-sub { font-size: 20px; }
            .status-info { font-size: 16px; }
            .status-info-small { font-size: 13px; }
            .info-bar { bottom: 20px; left: 20px; right: 20px; flex-direction: column; gap: 10px; align-items: flex-start; }
            .branding-bar { top: 20px; left: 20px; right: 20px; }
            .demo-panel { bottom: 20px; right: 20px; }
        }

        @media (max-width: 480px) {
            .alert-icon { font-size: 60px; }
            .status-main { font-size: 30px; letter-spacing: 1px; }
            .status-sub { font-size: 16px; }
            .status-info { font-size: 14px; }
            .status-info-small { font-size: 11px; }
            .info-value { font-size: 13px; }
            .info-label { font-size: 10px; }
        }
    </style>
</head>
<body class="state-green">

    <!-- ============ MAIN SCREEN ============ -->
    <div class="screen-container">
        
        <!-- Top Branding -->
        <div class="branding-bar">
            <span class="branding-logo">◆ kl SAFETY SYSTEM</span>
            <span class="branding-time" id="liveTime">02:45 AM</span>
        </div>

        <!-- Central Alert Content -->
        <div class="alert-content">
            <div class="alert-icon" id="alertIcon">🛡️</div>
            <div class="status-main" id="statusMain">AREA CLEAR</div>
            <div class="status-sub" id="statusSub">100 Meters Safe Zone</div>
            <div class="status-info" id="statusInfo">Safe to Exit Vehicle</div>
            <div class="status-info-small" id="statusInfoSmall"></div>
        </div>

        <!-- Bottom Info Bar -->
        <div class="info-bar">
            <div class="info-bar-left">
                <span class="info-label">Worker</span>
                <span class="info-value" id="workerName">Rajesh Kumar</span>
            </div>
            <div class="info-bar-left">
                <span class="info-label">Vehicle</span>
                <span class="info-value" id="vehicleId">kl-04</span>
            </div>
            <div class="info-bar-right">
                <span class="info-label">Last Updated</span>
                <span class="info-value" id="lastUpdated">02:45:00 AM</span>
            </div>
        </div>

    </div>

    <!-- ============ DEMO PANEL ============ -->
    <div class="demo-panel">
        <button class="demo-toggle" id="demoToggle" title="Demo Controls">⚙ Demo</button>
        <div class="demo-buttons" id="demoButtons">
            <button class="demo-btn btn-green" onclick="setState('green')">🟢 Area Clear</button>
            <button class="demo-btn btn-yellow" onclick="setState('yellow')">🟡 Movement Detected</button>
            <button class="demo-btn btn-red" onclick="setState('red')">🔴 Danger - Elephant</button>
        </div>
    </div>

    <script>
        // ============ DOM ELEMENTS ============
        const body = document.body;
        const alertIcon = document.getElementById('alertIcon');
        const statusMain = document.getElementById('statusMain');
        const statusSub = document.getElementById('statusSub');
        const statusInfo = document.getElementById('statusInfo');
        const statusInfoSmall = document.getElementById('statusInfoSmall');
        const workerName = document.getElementById('workerName');
        const vehicleId = document.getElementById('vehicleId');
        const lastUpdated = document.getElementById('lastUpdated');
        const liveTime = document.getElementById('liveTime');
        const demoToggle = document.getElementById('demoToggle');
        const demoButtons = document.getElementById('demoButtons');

        // ============ CURRENT STATE ============
        let currentState = 'green';

        // ============ STATE DATA ============
        const stateData = {
            green: {
                className: 'state-green',
                icon: '🛡️',
                main: 'AREA CLEAR',
                sub: '100 Meters Safe Zone',
                info: 'Safe to Exit Vehicle',
                infoSmall: '',
                worker: 'Rajesh Kumar',
                vehicle: 'kl-04'
            },
            yellow: {
                className: 'state-yellow',
                icon: '⚠️',
                main: 'MOVEMENT DETECTED',
                sub: 'Stay Inside Vehicle',
                info: 'Distance: 130m | Direction: North-East',
                infoSmall: 'Animal Not Yet Identified',
                worker: 'Rajesh Kumar',
                vehicle: 'kl-04'
            },
            red: {
                className: 'state-red',
                icon: '❗',
                main: 'DANGER! ELEPHANT',
                sub: '95 Meters | North-East',
                info: 'DO NOT MOVE',
                infoSmall: 'TURN OFF ENGINE | Confidence: 97%',
                worker: 'Rajesh Kumar',
                vehicle: 'kl-04'
            }
        };

        // ============ SET STATE FUNCTION ============
        function setState(state) {
            if (!stateData[state]) return;
            
            currentState = state;
            const data = stateData[state];
            
            // Remove all state classes
            body.classList.remove('state-green', 'state-yellow', 'state-red');
            // Add new state class
            body.classList.add(data.className);
            
            // Update content
            alertIcon.textContent = data.icon;
            statusMain.textContent = data.main;
            statusSub.textContent = data.sub;
            statusInfo.textContent = data.info;
            statusInfoSmall.textContent = data.infoSmall;
            workerName.textContent = data.worker;
            vehicleId.textContent = data.vehicle;
            
            // Update time
            updateTimestamps();
            
            // Hide demo panel after selection (optional - comment out if you want panel to stay open)
            // demoButtons.classList.remove('show');
        }

        // ============ UPDATE TIMESTAMPS ============
        function updateTimestamps() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('en-US', { 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit',
                hour12: true 
            });
            lastUpdated.textContent = timeStr;
            liveTime.textContent = now.toLocaleTimeString('en-US', { 
                hour: '2-digit', 
                minute: '2-digit',
                hour12: true 
            });
        }

        // ============ DEMO PANEL TOGGLE ============
        demoToggle.addEventListener('click', (e) => {
            e.stopPropagation();
            demoButtons.classList.toggle('show');
        });

        // Close demo panel when clicking outside
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.demo-panel')) {
                demoButtons.classList.remove('show');
            }
        });

        // ============ KEYBOARD SHORTCUTS (For Testing) ============
        document.addEventListener('keydown', (e) => {
            switch(e.key.toLowerCase()) {
                case '1':
                    setState('green');
                    break;
                case '2':
                    setState('yellow');
                    break;
                case '3':
                    setState('red');
                    break;
                case 'd':
                    demoButtons.classList.toggle('show');
                    break;
                default:
                    break;
            }
        });

        // ============ LIVE CLOCK UPDATE ============
        setInterval(updateTimestamps, 10000);

        // ============ INITIAL SETUP ============
        updateTimestamps();

        console.log('✅ kl Worker Tablet Screen Initialized');
        console.log('🖱️  Mouse cursor is now visible for demo purposes');
        console.log('📋 Current State:', currentState.toUpperCase());
        console.log('⌨️  Keyboard Shortcuts: Press 1=Safe, 2=Caution, 3=Danger, D=Demo Panel');
    </script>

</body>
</html>
